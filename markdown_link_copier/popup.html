<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Link Copier</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      padding: 14px;
      background: #f6f7fb;
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 2px 4px;
    }

    .header h2 {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .format-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .format-option {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) auto;
      align-items: center;
      width: 100%;
      min-height: 58px;
      padding: 10px;
      border: 1px solid #d7dce5;
      border-radius: 8px;
      background: #fff;
      color: inherit;
      cursor: pointer;
      font: inherit;
      text-align: left;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }

    .format-option:hover {
      border-color: #6aa7f8;
      background: #eef6ff;
      transform: translateY(-1px);
    }

    .format-option:active {
      transform: translateY(0);
    }

    .format-option:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.28);
      outline-offset: 2px;
    }

    .format-option:disabled {
      cursor: default;
      opacity: 0.72;
      transform: none;
    }

    .format-option.is-copying {
      border-color: #16a34a;
      background: #edfdf3;
    }

    .format-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: #e8f1ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }

    .format-detail {
      min-width: 0;
      padding: 0 10px;
    }

    .format-name {
      display: block;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .format-sample {
      display: block;
      margin-top: 3px;
      overflow: hidden;
      color: #64748b;
      font-size: 11px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .shortcut {
      min-width: 52px;
      padding: 4px 6px;
      border: 1px solid #d6dde8;
      border-radius: 6px;
      background: #eef2f7;
      color: #334155;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .shortcut.is-unset {
      color: #7c8797;
      font-weight: 600;
    }

    .status {
      min-height: 18px;
      color: #166534;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .status.is-error {
      color: #b91c1c;
    }

    .shortcut-settings {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d7dce5;
      border-radius: 8px;
      background: transparent;
      color: #2563eb;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      transition: background 0.16s ease, border-color 0.16s ease;
    }

    .shortcut-settings:hover {
      border-color: #9bbcf0;
      background: #edf4ff;
    }

    .shortcut-settings:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.28);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Link Copier</h2>
    </div>

    <div class="format-list" aria-label="リンク形式">
      <button type="button" class="format-option" data-format="markdown">
        <span class="format-icon">#</span>
        <span class="format-detail">
          <span class="format-name">Markdown</span>
          <span class="format-sample">[title](url)</span>
        </span>
        <kbd class="shortcut" data-shortcut-for="markdown">...</kbd>
      </button>

      <button type="button" class="format-option" data-format="html">
        <span class="format-icon">&lt;&gt;</span>
        <span class="format-detail">
          <span class="format-name">HTML</span>
          <span class="format-sample">&lt;a href=&quot;url&quot;&gt;title&lt;/a&gt;</span>
        </span>
        <kbd class="shortcut" data-shortcut-for="html">...</kbd>
      </button>

      <button type="button" class="format-option" data-format="text">
        <span class="format-icon">T</span>
        <span class="format-detail">
          <span class="format-name">Text</span>
          <span class="format-sample">title - url</span>
        </span>
        <kbd class="shortcut" data-shortcut-for="text">...</kbd>
      </button>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <button type="button" id="shortcutSettings" class="shortcut-settings">
      ショートカットを変更...
    </button>
  </div>

  <script src="link-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
